<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prospecções Versão 1.5</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #f5f3f0;
  --bg2:         #efebe6;
  --surface:     #ffffff;
  --surface2:    #faf8f5;
  --border:      #e2ddd6;
  --border2:     #d1cbc2;
  --ink:         #1e1b18;
  --ink2:        #544f49;
  --muted:       #a6a09a;
  --shadow:      rgba(30,20,10,0.06);
  --shadow-md:   rgba(30,20,10,0.12);

  --novo:        #2563eb;
  --novo-bg:     #eff6ff;
  --novo-border: #bfdbfe;

  --neg:         #d97706;
  --neg-bg:      #fffbeb;
  --neg-border:  #fde68a;

  --rep:         #7c3aed;
  --rep-bg:      #f5f3ff;
  --rep-border:  #ddd6fe;

  --can:         #dc2626;
  --can-bg:      #fff5f5;
  --can-border:  #fecaca;

  --florio:      #2d6a4f;
  --florio-bg:   #e9f5ef;
  --florio-border: #b7e4c7;

  --whatsapp:    #25d366;
  --radius:      12px;

  --rep0: #2563eb; --rep0-bg: #eff6ff;
  --rep1: #d97706; --rep1-bg: #fffbeb;
  --rep2: #059669; --rep2-bg: #ecfdf5;
  --rep3: #7c3aed; --rep3-bg: #f5f3ff;
  --rep4: #db2777; --rep4-bg: #fdf2f8;
  --rep5: #0891b2; --rep5-bg: #ecfeff;
  --rep6: #65a30d; --rep6-bg: #f7fee7;
  --rep7: #ea580c; --rep7-bg: #fff7ed;
}

html, body { height: 100%; background: var(--bg); color: var(--ink); font-family: 'Inter', system-ui, -apple-system, sans-serif; overflow-x: hidden; }

/* ── Views ─────────────────────────────────────────── */
.view { display: none; }
.view.active { display: block; }

/* ── Topbar ─────────────────────────────────────────── */
.topbar {
  height: 62px;
  background: var(--surface);
  border-bottom: 1.5px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 14px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 12px var(--shadow);
  flex-wrap: wrap;
}

.brand { display: flex; align-items: baseline; gap: 6px; flex-shrink: 0; }
.brand-name { font-family: 'Inter', sans-serif; font-size: 20px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; }
.brand-tag  { font-size: 10px; font-weight: 600; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
.version-badge {
  font-size: 10px; font-weight: 700; letter-spacing: 0.08em;
  padding: 2px 8px; border-radius: 99px;
  background: var(--rep-bg); border: 1.5px solid var(--rep-border);
  color: var(--rep); white-space: nowrap; align-self: center;
}

.topbar-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }

.stat-row { display: flex; gap: 6px; flex-wrap: wrap; }
.stat-chip {
  font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 99px;
  background: var(--surface2); border: 1.5px solid var(--border); color: var(--ink2);
  display: flex; align-items: center; gap: 5px; white-space: nowrap;
}
.stat-chip b { color: var(--ink); font-weight: 700; }

.live-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: #16a34a; box-shadow: 0 0 0 2px rgba(22,163,74,0.25);
  animation: pulse 2.2s ease infinite;
}
@keyframes pulse {
  0%,100% { box-shadow: 0 0 0 2px rgba(22,163,74,0.25); }
  50%      { box-shadow: 0 0 0 5px rgba(22,163,74,0); }
}

.btn-modulo {
  display: flex; align-items: center; gap: 7px;
  padding: 6px 14px; border-radius: 8px;
  border: 1.5px solid var(--rep-border);
  background: var(--rep-bg); color: var(--rep);
  font-size: 12px; font-weight: 600;
  font-family: 'Inter', sans-serif;
  cursor: pointer; transition: all 0.18s; white-space: nowrap;
  flex-shrink: 0;
}
.btn-modulo:hover { background: var(--rep); color: #fff; border-color: var(--rep); }
.btn-modulo.active { background: var(--rep); color: #fff; border-color: var(--rep); }

.search-wrap {
  position: relative; margin-left: auto; flex-shrink: 0;
}
.search-wrap svg {
  position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
  color: var(--muted); pointer-events: none;
}
.search-wrap input {
  background: var(--surface2); border: 1.5px solid var(--border);
  border-radius: 8px; padding: 8px 12px 8px 34px;
  font-size: 13px; font-family: 'Inter', sans-serif; color: var(--ink);
  outline: none; width: 220px; transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input::placeholder { color: var(--muted); }
.search-wrap input:focus { border-color: var(--novo); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }

/* ── Board ──────────────────────────────────────────── */
.board {
  display: flex; gap: 12px; padding: 18px 18px 60px;
  min-height: calc(100vh - 62px); align-items: stretch;
}
.col {
  flex: 1; min-width: 260px; display: flex; flex-direction: column;
  animation: colIn 0.45s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes colIn {
  from { opacity: 0; transform: translateY(18px); }
  to   { opacity: 1; transform: translateY(0); }
}
.col-header {
  display: flex; align-items: center; gap: 9px;
  padding: 10px 12px 11px; border-radius: 10px 10px 0 0;
  border: 1.5px solid transparent; border-bottom: none;
}
.col[data-col="novo"]          .col-header { background: var(--novo-bg);  border-color: var(--novo-border); }
.col[data-col="negociando"]    .col-header { background: var(--neg-bg);   border-color: var(--neg-border); }
.col[data-col="representante"] .col-header { background: var(--rep-bg);   border-color: var(--rep-border); }
.col[data-col="cancelado"]     .col-header { background: var(--can-bg);   border-color: var(--can-border); }

.col-stripe { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.col-title { font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; flex: 1; letter-spacing: -0.01em; }
.col[data-col="novo"]          .col-title { color: var(--novo); }
.col[data-col="negociando"]    .col-title { color: var(--neg); }
.col[data-col="representante"] .col-title { color: var(--rep); }
.col[data-col="cancelado"]     .col-title { color: var(--can); }
.col-count { font-family: 'Inter', monospace; font-size: 11px; padding: 2px 8px; border-radius: 99px; background: rgba(0,0,0,0.06); color: var(--ink2); font-weight: 600; }

.col-body {
  background: var(--bg2); border: 1.5px solid var(--border); border-top: none;
  border-radius: 0 0 10px 10px; padding: 10px 9px;
  display: flex; flex-direction: column; gap: 9px; flex: 1;
  transition: background 0.2s, border-color 0.2s;
}
.col-body.drag-over {
  background: rgba(37,99,235,0.06); border-color: var(--novo);
  outline: 2px dashed var(--novo); outline-offset: -2px;
}
.col-empty {
  border: 1.5px dashed var(--border2); border-radius: 8px; padding: 22px;
  text-align: center; color: var(--muted); font-size: 12px; background: rgba(255,255,255,0.4);
}

/* ── Card ───────────────────────────────────────────── */
.card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 0;
  transition: transform 0.18s, box-shadow 0.18s, opacity 0.18s;
  position: relative; overflow: hidden;
  animation: cardIn 0.3s cubic-bezier(0.22,1,0.36,1) both;
  cursor: grab; user-select: none;
}
.card:active { cursor: grabbing; }
@keyframes cardIn {
  from { opacity: 0; transform: scale(0.95) translateY(6px); }
  to   { opacity: 1; transform: scale(1) translateY(0); }
}
.card:hover { transform: translateY(-2px); box-shadow: 0 6px 22px var(--shadow-md); border-color: var(--border2); }
.card.dragging { opacity: 0.35; transform: scale(0.97); box-shadow: none; }

.card-stripe { height: 4px; width: 100%; }
.card[data-status="novo"]          .card-stripe { background: var(--novo); }
.card[data-status="negociando"]    .card-stripe { background: var(--neg); }
.card[data-status="representante"] .card-stripe { background: var(--rep); }
.card[data-status="cancelado"]     .card-stripe { background: var(--can); }

.card-inner { padding: 12px 14px 10px; }
.card-name { font-family: 'Inter', sans-serif; font-size: 15px; font-weight: 700; color: var(--ink); margin-bottom: 8px; letter-spacing: -0.01em; line-height: 1.25; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

.origem-chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.02em;
  padding: 3px 8px; border-radius: 99px; margin-bottom: 6px;
  background: linear-gradient(135deg, #1b4d3e 0%, #2d6a4f 100%);
  color: #fff; box-shadow: 0 2px 6px rgba(45,106,79,0.25);
  max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.origem-chip.fortunato {
  background: linear-gradient(135deg, #7c2d12 0%, #c2410c 100%);
  box-shadow: 0 2px 6px rgba(194,65,12,0.25);
}
.origem-chip .origem-icon { font-size: 10px; flex-shrink: 0; }

.segmento-chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
  padding: 4px 10px; border-radius: 99px; margin-bottom: 6px;
  background: linear-gradient(135deg, #1e3a5f 0%, #2563eb 100%);
  color: #fff; box-shadow: 0 2px 6px rgba(37,99,235,0.25);
  max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.segmento-chip .seg-icon { font-size: 12px; flex-shrink: 0; }

.rep-chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 10px; font-weight: 600; letter-spacing: 0.02em;
  padding: 3px 8px; border-radius: 99px; margin-bottom: 6px;
  max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.obs-chip {
  display: flex; align-items: flex-start; gap: 5px;
  font-size: 11px; color: var(--ink2); line-height: 1.4;
  background: #fffbeb; border: 1px solid #fde68a;
  border-radius: 6px; padding: 5px 8px; margin-bottom: 6px;
  font-style: italic;
}
.obs-chip .obs-ico { font-size: 11px; flex-shrink: 0; margin-top: 1px; }
.obs-chip .obs-text { overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

.card-fields { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
.field-row { display: flex; align-items: center; gap: 7px; font-size: 12px; color: var(--ink2); }
.field-row .ico { width: 16px; text-align: center; font-size: 12px; flex-shrink: 0; }

.doc-chip {
  display: inline-flex; align-items: center; gap: 5px;
  font-family: 'Inter', monospace; font-size: 10.5px; color: var(--ink2);
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 6px; padding: 3px 7px; margin-bottom: 2px;
}
.doc-chip .doc-type {
  font-size: 9px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase;
  background: var(--border); padding: 1px 5px; border-radius: 4px; color: var(--ink2);
}

.card-footer {
  border-top: 1px solid var(--border); padding: 8px 14px;
  display: flex; align-items: center; gap: 6px;
  background: var(--surface2); flex-wrap: wrap;
}
.card-time { font-size: 10px; color: var(--muted); font-family: 'Inter', monospace; flex: 1; min-width: 70px; font-weight: 500; }

.btn-wa {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 9px; border-radius: 6px;
  border: 1.5px solid #b7ebc8; background: #f0fdf4; color: #16a34a;
  font-size: 11px; font-weight: 600; font-family: 'Inter', sans-serif;
  cursor: pointer; text-decoration: none; transition: all 0.15s; white-space: nowrap;
}
.btn-wa:hover { background: var(--whatsapp); color: #fff; border-color: var(--whatsapp); box-shadow: 0 2px 8px rgba(37,211,102,0.3); }
.btn-wa svg { flex-shrink: 0; }

.btn-encaminhar {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 9px; border-radius: 6px;
  border: 1.5px solid var(--rep-border); background: var(--rep-bg); color: var(--rep);
  font-size: 11px; font-weight: 600; font-family: 'Inter', sans-serif;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.btn-encaminhar:hover { background: var(--rep); color: #fff; border-color: var(--rep); }

.card-moves { display: flex; gap: 4px; }
.btn-mv {
  width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid var(--border);
  background: var(--surface); color: var(--muted); font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.btn-mv:hover { background: var(--surface2); color: var(--ink); border-color: var(--border2); }
.btn-del {
  width: 28px; height: 28px; border-radius: 6px;
  border: 1.5px solid #fecaca; background: #fff5f5; color: #fca5a5;
  font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; transition: all 0.15s;
}
.btn-del:hover { background: var(--can); color: #fff; border-color: var(--can); }

/* ── Modal (overlay) ────────────────────────────────── */
.overlay {
  position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,0.45); backdrop-filter: blur(3px);
  display: flex; align-items: center; justify-content: center;
  padding: 20px; opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.overlay.open { opacity: 1; pointer-events: all; }

.modal {
  background: var(--surface); border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.25);
  padding: 24px; width: 100%; max-width: 440px;
  transform: scale(0.95); transition: transform 0.22s; position: relative;
}
.overlay.open .modal { transform: scale(1); }

.modal-title {
  font-family: 'Inter', sans-serif; font-size: 17px; font-weight: 700;
  color: var(--ink); margin-bottom: 16px; letter-spacing: -0.01em;
}
.modal-close {
  position: absolute; top: 16px; right: 16px;
  width: 30px; height: 30px; border-radius: 6px;
  border: 1.5px solid var(--border); background: var(--surface2);
  color: var(--muted); font-size: 14px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
}
.modal-close:hover { background: var(--can); color: #fff; border-color: var(--can); }

.rep-list-modal { display: flex; flex-direction: column; gap: 8px; max-height: 340px; overflow-y: auto; }
.rep-item-modal {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 8px;
  border: 1.5px solid var(--border); background: var(--surface2);
  cursor: pointer; transition: all 0.15s;
}
.rep-item-modal:hover { border-color: var(--rep); background: var(--rep-bg); }
.rep-item-modal .rep-avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff; flex-shrink: 0;
}
.rep-item-modal .rep-info { flex: 1; min-width: 0; }
.rep-item-modal .rep-nome-m { font-size: 13px; font-weight: 600; color: var(--ink); }
.rep-item-modal .rep-fone-m { font-size: 11px; color: var(--muted); font-family: 'Inter', monospace; }
.rep-item-modal .btn-wa-rep {
  display: flex; align-items: center; gap: 4px;
  padding: 5px 10px; border-radius: 6px;
  border: 1.5px solid #b7ebc8; background: #f0fdf4; color: #16a34a;
  font-size: 11px; font-weight: 600; font-family: 'Inter', sans-serif;
  cursor: pointer; text-decoration: none; white-space: nowrap;
  transition: all 0.15s;
}
.rep-item-modal .btn-wa-rep:hover { background: var(--whatsapp); color: #fff; border-color: var(--whatsapp); }

/* ── Módulo Representantes ──────────────────────────── */
#view-reps {
  max-width: 1400px; margin: 0 auto; padding: 28px 20px 60px;
}
.rep-page-header {
  display: flex; align-items: center; gap: 14px; margin-bottom: 24px;
  flex-wrap: wrap;
}
.rep-page-title {
  font-family: 'Inter', sans-serif; font-size: 22px; font-weight: 800;
  color: var(--ink); letter-spacing: -0.02em;
}
.btn-back {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 14px; border-radius: 8px;
  border: 1.5px solid var(--border); background: var(--surface);
  color: var(--ink2); font-size: 12px; font-weight: 600;
  font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s;
}
.btn-back:hover { border-color: var(--ink2); background: var(--surface2); }

/* Botão Voltar ao Painel na topbar (visível só na view reps) */
#btn-voltar-painel {
  display: none;
  align-items: center; gap: 6px;
  padding: 6px 14px; border-radius: 8px;
  border: 1.5px solid var(--border); background: var(--surface2);
  color: var(--ink2); font-size: 12px; font-weight: 600;
  font-family: 'Inter', sans-serif; cursor: pointer; transition: all 0.15s;
  white-space: nowrap; flex-shrink: 0;
}
#btn-voltar-painel:hover { border-color: var(--novo); color: var(--novo); background: var(--novo-bg); }
#btn-voltar-painel.visible { display: flex; }

.rep-form-card {
  background: var(--surface); border: 1.5px solid var(--border);
  border-radius: var(--radius); padding: 20px; margin-bottom: 28px;
  box-shadow: 0 2px 8px var(--shadow);
}
.rep-form-title { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 14px; }
.rep-form-row { display: grid; grid-template-columns: 1fr 1fr auto; gap: 12px; align-items: end; }
@media (max-width: 640px) { .rep-form-row { grid-template-columns: 1fr; } }

.rep-form-field { display: flex; flex-direction: column; gap: 5px; }
.rep-form-field label { font-size: 12px; font-weight: 600; color: var(--ink); }
.rep-form-field input {
  padding: 10px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  font-family: 'Inter', sans-serif; font-size: 13px; color: var(--ink);
  background: var(--surface2); outline: none; transition: border-color 0.2s;
}
.rep-form-field input:focus { border-color: var(--rep); box-shadow: 0 0 0 3px rgba(124,58,237,0.1); }

.btn-add-rep {
  padding: 10px 20px; border-radius: 8px;
  border: none; background: var(--rep); color: #fff;
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; transition: background 0.15s; white-space: nowrap;
  align-self: flex-end;
}
.btn-add-rep:hover { background: #6d28d9; }

/* Kanban dos Representantes */
.reps-kanban-container {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

.rep-group {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  box-shadow: 0 2px 8px var(--shadow);
}

.rep-group-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 18px;
  background: var(--surface2);
  border-bottom: 1.5px solid var(--border);
  flex-wrap: wrap;
}

.rep-group-avatar {
  width: 42px;
  height: 42px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 700;
  color: #fff;
  flex-shrink: 0;
}

.rep-group-info {
  flex: 1;
  min-width: 150px;
}

.rep-group-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--ink);
  letter-spacing: -0.01em;
}

.rep-group-phone {
  font-size: 12px;
  color: var(--muted);
  font-family: 'Inter', monospace;
  margin-top: 2px;
}

.rep-group-stats {
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 99px;
  background: var(--rep-bg);
  color: var(--rep);
}

.rep-group-wa {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 12px;
  border-radius: 6px;
  background: #f0fdf4;
  color: #16a34a;
  font-size: 12px;
  font-weight: 600;
  text-decoration: none;
  transition: all 0.15s;
}
.rep-group-wa:hover { background: var(--whatsapp); color: #fff; }

.rep-group-board {
  display: flex;
  gap: 12px;
  padding: 16px;
  overflow-x: auto;
  background: var(--bg2);
}

.rep-col {
  flex: 1;
  min-width: 260px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.rep-col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 10px;
  background: var(--surface2);
  border-radius: 8px;
  border: 1.5px solid var(--border);
}

.rep-col-title {
  font-size: 12px;
  font-weight: 700;
  color: var(--ink2);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.rep-col-count {
  font-size: 11px;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 99px;

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
// ════════════════════════════════════════════════════════════
// USUÁRIOS — edite aqui para adicionar/alterar logins
// tipo: 'admin' = acesso total | 'rep' = portal representante
// nome: deve ser EXATAMENTE igual ao cadastrado como representante
// ════════════════════════════════════════════════════════════
const USUARIOS = [
  { usuario: "Humberto", senha: "Vingtsun", tipo: "admin" },
  { usuario: "Leandro",  senha: "12345",   tipo: "rep"   },
  { usuario: "SAUL - 2", senha: "12345",   tipo: "rep"   },
  // Adicione mais usuários abaixo:
  // { usuario: "NomeRep", senha: "senha", tipo: "rep" },
];

// Estado de autenticação
let _usuarioLogado = null;  // { usuario, tipo }

// ── Helpers login ──────────────────────────────────────────
window.loginToggleOlho = function() {
  const i = document.getElementById('login-senha');
  const b = document.getElementById('login-olho');
  if (i.type === 'password') { i.type = 'text';     b.textContent = '🙈'; }
  else                        { i.type = 'password'; b.textContent = '👁'; }
};

document.addEventListener('DOMContentLoaded', () => {
  const iu = document.getElementById('login-usuario');
  const is = document.getElementById('login-senha');
  if (iu) iu.addEventListener('keydown', e => { if (e.key === 'Enter') is && is.focus(); });
  if (is) is.addEventListener('keydown', e => { if (e.key === 'Enter') fazerLogin(); });
});

window.fazerLogin = async function() {
  const usuario = (document.getElementById('login-usuario').value || '').trim();
  const senha   = (document.getElementById('login-senha').value   || '');
  const erroEl  = document.getElementById('login-erro');
  const btnEl   = document.getElementById('btn-login');
  erroEl.classList.remove('show');

  if (!usuario || !senha) {
    erroEl.textContent = 'Preencha usuário e senha.';
    erroEl.classList.add('show'); return;
  }

  // 1. Verifica admin (local, sem Firebase)
  const admin = USUARIOS.find(u =>
    u.tipo === 'admin' &&
    u.usuario.trim().toLowerCase() === usuario.toLowerCase() &&
    u.senha === senha
  );
  if (admin) { _aplicarLogin(admin); return; }

  // 2. Tenta como representante — busca no Firebase
  btnEl.disabled = true;
  btnEl.textContent = 'Verificando…';
  try {
    // Inicializa Firebase só para consulta (não inicia listeners do kanban ainda)
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const dbTemp = firebase.firestore();
    const snap = await dbTemp.collection(COLECAO_REPS).get();
    let repEncontrado = null;
    snap.forEach(doc => {
      const d = doc.data();
      if (d.nome && d.senha &&
          d.nome.trim().toLowerCase() === usuario.toLowerCase() &&
          d.senha === senha) {
        repEncontrado = { id: doc.id, ...d };
      }
    });
    if (!repEncontrado) {
      erroEl.textContent = 'Usuário ou senha incorretos.';
      erroEl.classList.add('show');
      btnEl.disabled = false;
      btnEl.innerHTML = SVG_ENTRAR + ' Entrar';
      return;
    }
    const user = { usuario: repEncontrado.nome, tipo: 'rep' };
    _usuarioLogado = user;
    _aplicarLogin(user);
  } catch(e) {
    erroEl.textContent = 'Erro de conexão: ' + e.message;
    erroEl.classList.add('show');
    btnEl.disabled = false;
    btnEl.innerHTML = SVG_ENTRAR + ' Entrar';
  }
};

const SVG_ENTRAR = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>`;

function _aplicarLogin(user) {
  _usuarioLogado = user;
  document.getElementById('tela-login').style.display = 'none';
  document.getElementById('main-topbar').style.display = '';
  const btnEl = document.getElementById('btn-login');
  btnEl.disabled = false; btnEl.innerHTML = SVG_ENTRAR + ' Entrar';
  const cor = user.tipo === 'admin' ? 'var(--novo)' : 'var(--rep)';
  document.getElementById('user-av').style.background = cor;
  document.getElementById('user-av').textContent      = user.usuario.charAt(0).toUpperCase();
  document.getElementById('user-nome-display').textContent = user.usuario;
  const wrap = document.getElementById('user-chip-wrap');
  if (user.tipo === 'rep') wrap.classList.add('rep'); else wrap.classList.remove('rep');

  if (user.tipo === 'admin') {
    document.getElementById('btn-reps').style.display = '';
    document.getElementById('demo-fab').style.display = '';
    document.getElementById('view-kanban').classList.add('active');
    if (!window._fbIniciado) { window._fbIniciado = true; iniciarFirebase(); }
  } else {
    document.getElementById('btn-reps').style.display  = 'none';
    document.getElementById('demo-fab').style.display  = 'none';
    document.getElementById('search-wrap').style.display = 'none';
    if (!window._fbIniciado) { window._fbIniciado = true; iniciarFirebase(); }
    setTimeout(() => abrirPortalRep(user.usuario), 350);
  }
}

window.fazerLogout = function() {
  // Para listener do rep se existir
  if (_rpUnsub) { _rpUnsub(); _rpUnsub = null; }
  _rpClientes = []; _rpFiltro = 'todos';
  _usuarioLogado = null;
  // Remove active de todas as views
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('btn-reps').classList.remove('active');
  document.getElementById('search-wrap').style.display  = '';
  document.getElementById('btn-voltar-painel').classList.remove('visible');
  document.getElementById('btn-reps').style.display = '';
  document.getElementById('demo-fab').style.display = '';
  document.getElementById('main-topbar').style.display = 'none';
  // Limpa campos e mostra login
  document.getElementById('login-usuario').value = '';
  document.getElementById('login-senha').value   = '';
  document.getElementById('login-erro').classList.remove('show');
  document.getElementById('tela-login').style.display = 'flex';
};

// ════════════════════════════════════════════════════════════
// PORTAL REPRESENTANTE (dentro do kanban)
// ════════════════════════════════════════════════════════════
let _rpFiltro   = 'todos';
let _rpUnsub    = null;
let _rpClientes = [];

function abrirPortalRep(nomeRep) {
  // Esconde kanban, mostra portal rep
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-rep-portal').classList.add('active');

  const root = document.getElementById('rep-portal-root');
  root.innerHTML = `
    <div id="view-rep-portal" style="max-width:1100px;margin:0 auto;padding:28px 20px 60px">
      <div class="rep-portal-header">
        <div>
          <div class="rep-portal-title">Meus Clientes</div>
          <div class="rep-portal-sub">Clientes encaminhados para você — <strong>${nomeRep}</strong></div>
        </div>
        <div class="rep-portal-badge">👤 ${nomeRep}</div>
      </div>
      <div class="rp-filtros" id="rp-filtros">
        <button class="rp-f-btn ativo" onclick="rpSetFiltro('todos',this)">Todos <span class="n" id="rpn-todos">0</span></button>
        <button class="rp-f-btn" onclick="rpSetFiltro('aguardando',this)">⏳ Aguardando <span class="n" id="rpn-aguard">0</span></button>
        <button class="rp-f-btn" onclick="rpSetFiltro('contatado',this)">📞 Contatado <span class="n" id="rpn-cont">0</span></button>
        <button class="rp-f-btn" onclick="rpSetFiltro('negociando',this)">🤝 Negociando <span class="n" id="rpn-neg">0</span></button>
        <button class="rp-f-btn" onclick="rpSetFiltro('comprou',this)">✅ Comprou <span class="n" id="rpn-comp">0</span></button>
        <button class="rp-f-btn" onclick="rpSetFiltro('desistiu',this)">❌ Desistiu <span class="n" id="rpn-des">0</span></button>
      </div>
      <div class="rep-portal-grid" id="rp-grid"></div>
    </div>
  `;

  // Escuta Firebase em tempo real
  if (_rpUnsub) { _rpUnsub(); _rpUnsub = null; }
  _rpUnsub = db.collection(COLECAO)
    .where('status', '==', 'representante')
    .onSnapshot(snap => {
      _rpClientes = [];
      snap.forEach(d => {
        const data = d.data();
        if (data.representanteNome &&
            data.representanteNome.trim().toLowerCase() === nomeRep.trim().toLowerCase()) {
          _rpClientes.push({ id: d.id, ...data });
        }
      });
      _rpClientes.sort((a, b) => (b.criadoEm?.seconds||0) - (a.criadoEm?.seconds||0));
      rpAtualizarBadges();
      rpRenderGrid();
    }, err => { mostrarToast('Erro: ' + err.message); });
}

function rpStCfg(res) {
  switch(res) {
    case 'comprou':    return { lbl:'Comprou',    cor:'#059669', bg:'#ecfdf5', brd:'#a7f3d0' };
    case 'negociando': return { lbl:'Negociando', cor:'#d97706', bg:'#fffbeb', brd:'#fde68a' };
    case 'desistiu':   return { lbl:'Desistiu',   cor:'#dc2626', bg:'#fef2f2', brd:'#fecaca' };
    case 'contatado':  return { lbl:'Contatado',  cor:'#2563eb', bg:'#eff6ff', brd:'#bfdbfe' };
    default:           return { lbl:'Aguardando', cor:'#7c3aed', bg:'#f5f3ff', brd:'#ddd6fe' };
  }
}

function rpCnt(res) {
  if (res === 'aguardando') return _rpClientes.filter(c => !c.resultadoRep || c.resultadoRep === 'aguardando').length;
  return _rpClientes.filter(c => c.resultadoRep === res).length;
}

function rpAtualizarBadges() {
  const el = id => document.getElementById(id);
  if (!el('rpn-todos')) return;
  el('rpn-todos').textContent  = _rpClientes.length;
  el('rpn-aguard').textContent = rpCnt('aguardando');
  el('rpn-cont').textContent   = rpCnt('contatado');
  el('rpn-neg').textContent    = rpCnt('negociando');
  el('rpn-comp').textContent   = rpCnt('comprou');
  el('rpn-des').textContent    = rpCnt('desistiu');
}

window.rpSetFiltro = function(f, btn) {
  _rpFiltro = f;
  document.querySelectorAll('.rp-f-btn').forEach(b => b.classList.remove('ativo'));
  if (btn) btn.classList.add('ativo');
  rpRenderGrid();
};

function rpListaFiltrada() {
  let l = [..._rpClientes];
  if (_rpFiltro !== 'todos') {
    if (_rpFiltro === 'aguardando') l = l.filter(c => !c.resultadoRep || c.resultadoRep === 'aguardando');
    else l = l.filter(c => c.resultadoRep === _rpFiltro);
  }
  return l;
}

function rpRenderGrid() {
  const grid = document.getElementById('rp-grid');
  if (!grid) return;
  const lista = rpListaFiltrada();
  grid.innerHTML = '';

  if (!lista.length) {
    grid.innerHTML = `<div class="rp-empty">
      <div class="ei">📭</div>
      <div class="et">Nenhum cliente aqui</div>
      <div class="es">Quando o painel encaminhar clientes para você, eles aparecerão aqui.</div>
    </div>`;
    return;
  }

  lista.forEach((c, i) => {
    const st  = rpStCfg(c.resultadoRep);
    const wa  = numWA(c.telefone);
    const waUrl = wa ? `https://wa.me/${wa}?text=${encodeURIComponent(`Olá ${(c.nome||'').split(' ')[0]}, tudo bem? Estou entrando em contato a respeito do seu interesse em nossos produtos.`)}` : null;
    const jaContatado = !!c.contatadoRep;
    const obs = c.observacaoRep || '';

    let chips = '';
    if (c.segmento) chips += `<span class="rp-chip-item" style="background:#f1f5f9;color:#475569;border:1.5px solid #e2e8f0">🏷️ ${c.segmento}</span>`;
    if (c.origem)   chips += `<span class="rp-chip-item" style="background:#fef3c7;color:#92400e;border:1.5px solid #fde68a">🌾 ${c.origem}</span>`;

    const card = document.createElement('div');
    card.className = 'rp-card';
    card.style.animationDelay = `${i*0.04}s`;
    card.innerHTML = `
      <div class="rp-card-stripe" style="background:${st.cor}"></div>
      <div class="rp-card-body">
        <div class="rp-card-row1">
          <div>
            <div class="rp-card-nome">${c.nome||'—'}</div>
            <div class="rp-card-data">Encaminhado em ${formatarDataBR(c.criadoEm)}</div>
          </div>
          <span class="rp-st-badge" style="background:${st.bg};color:${st.cor};border:1.5px solid ${st.brd}">${st.lbl}</span>
        </div>
        <div class="rp-card-info">
          <div class="rp-info-r"><span class="ic">📍</span><span>${c.cidade||'—'}${c.estado?', '+c.estado:''}</span></div>
          <div class="rp-info-r"><span class="ic">📞</span><strong>${c.telefone ? c.telefone.replace(/\D/g,'').replace(/(\d{2})(\d{4,5})(\d{4})/, '($1) $2-$3') : '—'}</strong></div>
          ${c.mensagem ? `<div class="rp-info-r"><span class="ic">💬</span><span style="color:var(--muted);font-style:italic">"${c.mensagem}"</span></div>` : ''}
          ${c.tipoDoc && c.documento ? `<div class="rp-info-r"><span class="ic">📄</span><span>${c.tipoDoc}: ${c.documento}</span></div>` : ''}
        </div>
        ${chips ? `<div class="rp-chips">${chips}</div>` : ''}
        <div class="rp-obs-wrap">
          <div class="rp-obs-lbl">Anotações da negociação</div>
          <textarea class="rp-obs-ta" id="rpobs-${c.id}" placeholder="Anote: proposta feita, próximos passos, resultado…">${obs}</textarea>
          <div class="rp-obs-row">
            <button class="btn-salvar-obs" onclick="rpSalvarObs('${c.id}')">💾 Salvar nota</button>
            <span class="obs-saved-ok" id="rpok-${c.id}">✓ Salvo!</span>
          </div>
        </div>
        <div class="rp-acoes">
          ${waUrl ? `<a class="rp-a-btn wa" href="${waUrl}" target="_blank" rel="noopener" onclick="rpMarcarContatado('${c.id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            WhatsApp
          </a>` : ''}
          <button class="rp-a-btn ct ${jaContatado?'marcado':''}" id="rp-ct-${c.id}"
            onclick="${jaContatado ? 'void(0)' : `rpMarcarContatado('${c.id}')`}"
            ${jaContatado ? 'title="Contato já registrado"' : ''}>
            ${jaContatado ? '✅ Contatado' : '📞 Registrar contato'}
          </button>
          <div class="rp-res-wrap">
            <button class="btn-rp-res" onclick="rpToggleDrop('rpd-${c.id}')">🔖 Resultado ▾</button>
            <div class="rp-dropdown" id="rpd-${c.id}">
              <div class="rp-d-item" onclick="rpSetResultado('${c.id}','contatado')">📞 Contatado — aguardando</div>
              <div class="rp-d-item" onclick="rpSetResultado('${c.id}','negociando')">🤝 Em negociação</div>
              <div class="rp-d-item" onclick="rpSetResultado('${c.id}','comprou')">✅ Comprou / Fechou</div>
              <div class="rp-d-item" onclick="rpSetResultado('${c.id}','desistiu')">❌ Desistiu / Sem interesse</div>
              <div class="rp-d-item" onclick="rpSetResultado('${c.id}','aguardando')">⏳ Aguardando retorno</div>
            </div>
          </div>
          <button class="rp-a-btn" style="border-color:var(--can-border);background:var(--can-bg);color:var(--can);margin-left:4px"
            onclick="rpDeletarCard('${c.id}','${(c.nome||'').replace(/'/g,"\\'")}')">
            🗑️ Remover
          </button>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
}

window.rpToggleDrop = function(id) {
  document.querySelectorAll('.rp-dropdown').forEach(d => { if (d.id !== id) d.classList.remove('open'); });
  document.getElementById(id)?.classList.toggle('open');
};
document.addEventListener('click', e => {
  if (!e.target.closest('.rp-res-wrap'))
    document.querySelectorAll('.rp-dropdown').forEach(d => d.classList.remove('open'));
});

window.rpMarcarContatado = async function(id) {
  const btn = document.getElementById(`rp-ct-${id}`);
  if (btn && btn.classList.contains('marcado')) return;
  try {
    await db.collection(COLECAO).doc(id).update({
      contatadoRep: true,
      contatadoRepEm: firebase.firestore.FieldValue.serverTimestamp(),
      resultadoRep: 'contatado'
    });
    mostrarToast('📞 Contato registrado!');
  } catch(e) { mostrarToast('Erro: ' + e.message); }
};

window.rpSetResultado = async function(id, res) {
  document.querySelectorAll('.rp-dropdown').forEach(d => d.classList.remove('open'));
  const upd = { resultadoRep: res };
  if (res !== 'aguardando') upd.contatadoRep = true;

// Helpers de data
function formatarDataBR(criadoEm) {
  if (!criadoEm) return '—';
  let d;
  if (criadoEm && typeof criadoEm.toDate === 'function') d = criadoEm.toDate();
  else if (criadoEm instanceof Date) d = criadoEm;
  else if (criadoEm && criadoEm.seconds) d = new Date(criadoEm.seconds * 1000);
  else d = new Date(criadoEm);
  if (isNaN(d.getTime())) return '—';
  return d.toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric' });
}

function tempoRelativo(criadoEm) {
  if (!criadoEm) return '—';
  let d;
  if (typeof criadoEm.toDate === 'function') d = criadoEm.toDate();
  else if (criadoEm instanceof Date) d = criadoEm;
  else if (criadoEm && criadoEm.seconds) d = new Date(criadoEm.seconds * 1000);
  else d = new Date(criadoEm);
  if (isNaN(d.getTime())) return '—';
  const s = Math.floor((Date.now() - d.getTime()) / 1000);
  if (s < 60)     return 'agora';
  if (s < 3600)   return Math.floor(s/60) + 'min atrás';
  if (s < 86400)  return Math.floor(s/3600) + 'h atrás';
  if (s < 604800) return Math.floor(s/86400) + 'd atrás';
  return formatarDataBR(criadoEm);
}

// WhatsApp helpers
function numWA(tel) {
  const n = (tel||'').replace(/\D/g,'');
  if (!n || n.length < 10) return null;
  return n.startsWith('55') ? n : '55' + n;
}

function urlWhatsApp(telefone, nome) {
  const n = numWA(telefone);
  if (!n) return null;
  const texto = encodeURIComponent(`Olá ${nome ? nome.split(' ')[0] : ''}, tudo bem? Estou entrando em contato referente ao seu cadastro na Florio Alimentos.`);
  return `https://wa.me/${n}?text=${texto}`;
}

// Drag and Drop
let _dragId = null, _dragStatus = null;

function setupDragDrop(card, docId, colStatus) {
  card.setAttribute('draggable', 'true');
  card.addEventListener('dragstart', (e) => {
    _dragId = docId; _dragStatus = colStatus;
    card.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', docId);
  });
  card.addEventListener('dragend', () => {
    card.classList.remove('dragging');
    document.querySelectorAll('.col-body').forEach(b => b.classList.remove('drag-over'));
    _dragId = null;
  });
}

function setupDropZone(body, targetStatus) {
  body.addEventListener('dragover', (e) => {
    e.preventDefault(); e.dataTransfer.dropEffect = 'move';
    if (_dragId && _dragStatus !== targetStatus) body.classList.add('drag-over');
  });
  body.addEventListener('dragleave', (e) => {
    if (!body.contains(e.relatedTarget)) body.classList.remove('drag-over');
  });
  body.addEventListener('drop', (e) => {
    e.preventDefault(); body.classList.remove('drag-over');
    if (!_dragId || _dragStatus === targetStatus) return;
    mover(_dragId, targetStatus);
  });
}

window.encaminharRep = function(clienteId, repId, repNome) {
  if (_demoAtivo) {
    const idx = _allDocs.findIndex(d => d.id === clienteId);
    if (idx >= 0) {
      _allDocs[idx].status = 'representante';
      _allDocs[idx].representanteNome = repNome;
      _allDocs[idx].representanteId   = repId;
      renderBoard(_allDocs);
      renderRepsKanban();
    }
    mostrarToast(`Encaminhado para ${repNome}`);
    fecharModal('modal-enc-overlay');
    return;
  }
  if (window._fbMoverStatus) {
    window._fbMoverStatus(clienteId, 'representante', {
      representanteNome: repNome,
      representanteId:   repId,
    });
    mostrarToast(`Encaminhado para ${repNome}`);
    fecharModal('modal-enc-overlay');
  }
};

function abrirModal(id) { document.getElementById(id).classList.add('open'); }
window.fecharModal = function(id) { document.getElementById(id).classList.remove('open'); };

// Navegação
window.irParaReps = function() {
  document.getElementById('view-kanban').classList.remove('active');
  document.getElementById('view-reps').classList.add('active');
  document.getElementById('btn-reps').classList.add('active');

  renderRepsKanban();
};

window.voltarKanban = function() {
  document.getElementById('view-reps').classList.remove('active');
  document.getElementById('view-kanban').classList.add('active');
  document.getElementById('btn-reps').classList.remove('active');
  document.getElementById('search-wrap').style.display = '';
  document.getElementById('btn-voltar-painel').classList.remove('visible');
  renderBoard(_allDocs);
};

// Filtro
window.filtrar = function(q) {
  const t = q.toLowerCase().trim();
  if (!t) { renderBoard(_allDocs); return; }
  const filtered = _allDocs.filter(d =>
    (d.nome||'').toLowerCase().includes(t) ||
    (d.cidade||'').toLowerCase().includes(t) ||
    (d.estado||'').toLowerCase().includes(t) ||
    (d.segmento||'').toLowerCase().includes(t) ||
    (d.telefone||'').replace(/\D/g,'').includes(t.replace(/\D/g,'')) ||
    (d.documento||'').replace(/\D/g,'').includes(t.replace(/\D/g,'')) ||
    (d.origem||'').toLowerCase().includes(t) ||
    (d.representanteNome||'').toLowerCase().includes(t)
  );
  renderBoard(filtered);
};

// Mover
window.mover = function(id, novoStatus) {
  if (_demoAtivo) {
    const idx = _allDocs.findIndex(d => d.id === id);
    if (idx >= 0) {
      _allDocs[idx].status = novoStatus;
      if (novoStatus !== 'representante') {
        delete _allDocs[idx].representanteNome;
        delete _allDocs[idx].representanteId;
      }
      renderBoard(_allDocs);
      renderRepsKanban();
    }
    mostrarToast("Status atualizado");
    return;
  }
  if (window._fbMoverStatus) {
    const upd = { status: novoStatus };
    if (novoStatus !== 'representante') {
      upd.representanteNome = '';
      upd.representanteId = '';
    }
    window._fbMoverStatus(id, novoStatus, upd);
  } else {
    mostrarToast("Firebase não conectado");
  }
};

// Deletar
window.deletar = function(id) {
  if (_demoAtivo) {
    if (!confirm("Remover do demo?")) return;
    _allDocs = _allDocs.filter(d => d.id !== id);
    renderBoard(_allDocs);
    renderRepsKanban();
    mostrarToast("Card removido do demo");
    return;
  }
  if (window._fbDeletar) window._fbDeletar(id);
  else mostrarToast("Firebase não conectado");
};

// Demo toggle
window.toggleDemo = function() {
  _demoAtivo = !_demoAtivo;
  window._demoAtivo = _demoAtivo;
  const fab   = document.getElementById('demo-fab');
  const label = document.getElementById('demo-label');
  if (_demoAtivo) {
    fab.classList.add('active');
    label.textContent = 'Demo Ativo';
    _allDocs = JSON.parse(JSON.stringify(DEMO));
    _allDocs.forEach((d, i) => { d.criadoEm = DEMO[i].criadoEm; });
    renderKanban(_allDocs);
    renderRepsKanban();
    mostrarToast("Modo demonstração ativado");
  } else {
    fab.classList.remove('active');
    label.textContent = 'Modo Demo';
    const real = window._docsFirebase || [];
    renderKanban(real);
    renderRepsKanban();
    mostrarToast(real.length === 0 ? "Firebase: sem dados ainda" : "Voltou ao Firebase");
  }
};

// Toast
window.mostrarToast = function(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 3000);
};

// Formatar telefone para exibição (11) 99999-9999
function formatFone(tel) {
  if (!tel) return '—';
  const n = tel.replace(/\D/g,'');
  if (n.length === 11) return `(${n.slice(0,2)}) ${n.slice(2,7)}-${n.slice(7)}`;
  if (n.length === 10) return `(${n.slice(0,2)}) ${n.slice(2,6)}-${n.slice(6)}`;
  return tel;
}

// Helper: mostrar/ocultar senha
window.toggleSenhaVisivel = function(inputId, btn) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else                         { inp.type = 'password'; btn.textContent = '👁'; }
};

// Editar representante (nome, telefone e senha)
window.editarRep = function(id) {
  const reps = window._reps || [];
  const rep  = reps.find(r => r.id === id);
  if (!rep) return;

  // Cria modal inline se não existir
  let overlay = document.getElementById('modal-edit-rep-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'modal-edit-rep-overlay';
    overlay.className = 'overlay';
    overlay.innerHTML = `
      <div class="modal" onclick="event.stopPropagation()" style="max-width:420px">
        <button class="modal-close" onclick="fecharModal('modal-edit-rep-overlay')">✕</button>
        <div class="modal-title">Editar Representante</div>
        <div style="display:flex;flex-direction:column;gap:14px;margin-top:4px">
          <div class="rep-form-field">
            <label>Nome</label>
            <input type="text" id="edit-rep-nome" placeholder="Nome do representante">
          </div>
          <div class="rep-form-field">
            <label>WhatsApp (com DDD)</label>
            <input type="tel" id="edit-rep-fone" placeholder="11 99999-9999" maxlength="15" inputmode="numeric">
          </div>
          <div class="rep-form-field">
            <label>Senha de acesso <span style="font-size:10px;color:var(--muted);font-weight:400">(deixe em branco para não alterar)</span></label>
            <div class="senha-input-wrap">
              <input type="password" id="edit-rep-senha" placeholder="Nova senha (mín. 4 caracteres)" autocomplete="new-password">
              <button type="button" class="btn-toggle-senha" onclick="toggleSenhaVisivel('edit-rep-senha', this)" title="Mostrar/ocultar">👁</button>
            </div>
          </div>
          <button class="btn-add-rep" style="align-self:flex-end;margin-top:4px" onclick="salvarEdicaoRep()">💾 Salvar alterações</button>
        </div>
      </div>`;
    overlay.addEventListener('click', (e) => { if (e.target === overlay) fecharModal('modal-edit-rep-overlay'); });
    document.body.appendChild(overlay);

    // Máscara telefone no campo edição
    document.getElementById('edit-rep-fone').addEventListener('input', function() {
      let v = this.value.replace(/\D/g,'').slice(0,11);
      if (v.length > 2) v = v.slice(0,2) + ' ' + v.slice(2);
      if (v.length > 8) v = v.slice(0,9) + '-' + v.slice(9);
      this.value = v;
    });
  }

  // Preenche com dados atuais
  document.getElementById('edit-rep-nome').value  = rep.nome;
  document.getElementById('edit-rep-fone').value  = formatFone(rep.telefone).replace(/\D/g,'').replace(/(\d{2})(\d{4,5})(\d{4})/, '$1 $2-$3');
  document.getElementById('edit-rep-senha').value = '';
  overlay.setAttribute('data-rep-id', id);
  abrirModal('modal-edit-rep-overlay');
};

window.salvarEdicaoRep = async function() {
  const overlay   = document.getElementById('modal-edit-rep-overlay');
  const id        = overlay.getAttribute('data-rep-id');
  const novoNome  = document.getElementById('edit-rep-nome').value.trim();
  const novoFone  = document.getElementById('edit-rep-fone').value.replace(/\D/g,'');
  const novaSenha = document.getElementById('edit-rep-senha').value.trim();

  if (!novoNome)          { mostrarToast('Nome não pode ser vazio'); return; }
  if (novoFone.length < 10) { mostrarToast('Telefone inválido'); return; }
  if (novaSenha && novaSenha.length < 4) { mostrarToast('A senha deve ter ao menos 4 caracteres'); return; }

  const upd = { nome: novoNome, telefone: novoFone };
  if (novaSenha) upd.senha = novaSenha;

  if (_demoAtivo) {
    const idx = (window._reps||[]).findIndex(r => r.id === id);
    if (idx >= 0) { Object.assign(window._reps[idx], upd); }
    renderRepsList(); renderRepsKanban();
    mostrarToast('Representante atualizado');
    fecharModal('modal-edit-rep-overlay');
    return;
  }
  try {
    await db.collection(COLECAO_REPS).doc(id).update(upd);
    mostrarToast(novaSenha ? 'Representante e senha atualizados' : 'Representante atualizado');
    fecharModal('modal-edit-rep-overlay');
  } catch(e) { mostrarToast('Erro: ' + e.message); }
};

// Enviar credenciais de acesso por WhatsApp
window.enviarCredenciais = function(repId) {
  const rep = (window._reps||[]).find(r => r.id === repId);
  if (!rep) return;
  const wa = numWA(rep.telefone);
  if (!wa) { mostrarToast('Representante sem WhatsApp cadastrado'); return; }
  const msg = encodeURIComponent(
    `Olá ${rep.nome.split(' ')[0]}! Aqui estão seus dados de acesso ao Portal do Representante:\n\n` +
    ` Usuário: ${rep.nome}\n` +
    ` Senha: ${rep.senha}\n\n` +
    `Acesse o portal para visualizar seus clientes encaminhados.`
  );
  window.open(`https://wa.me/${wa}?text=${msg}`, '_blank');
};

// Deletar card pelo representante (com notificação no painel)
window.rpDeletarCard = async function(clienteId, clienteNome) {
  if (!confirm(`Remover "${clienteNome}" da sua lista?\n\nIsso ficará registrado no painel do administrador.`)) return;
  try {
    await db.collection(COLECAO).doc(clienteId).update({
      status: 'cancelado',
      resultadoRep: 'desistiu',
      removidoPeloRep: true,
      removidoPeloRepEm: firebase.firestore.FieldValue.serverTimestamp(),
      removidoPeloRepNome: _usuarioLogado?.usuario || '—',
      observacaoRep: (await (async () => {
        const doc = await db.collection(COLECAO).doc(clienteId).get();
        const obs = doc.data()?.observacaoRep || '';
        return obs ? obs + '\n[Removido pelo representante]' : '[Removido pelo representante]';
      })())
    });
    mostrarToast('Card removido e notificado no painel');
  } catch(e) { mostrarToast('Erro: ' + e.message); }
};

// Confirmar chamada do cliente
window.confirmarChamada = function(repTelefone, clienteNome, repNome) {
  const wa = numWA(repTelefone);
  if (!wa) { mostrarToast('Representante sem telefone cadastrado'); return; }
  const msg = encodeURIComponent(`Já chamou o cliente ${clienteNome}?`);
  window.open(`https://wa.me/${wa}?text=${msg}`, '_blank');
};
const repFoneInput = document.getElementById('rep-fone-input');
if (repFoneInput) {
  repFoneInput.addEventListener('input', function() {
    let v = this.value.replace(/\D/g,'').slice(0,11);
    if (v.length > 2) v = v.slice(0,2) + ' ' + v.slice(2);
    if (v.length > 8) v = v.slice(0,9) + '-' + v.slice(9);
    this.value = v;
  });
}
</script>
